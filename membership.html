<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Membership | Car Buyer Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="text-slate-900" x-data="{ mobileMenuOpen: false, mode: '' }">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-24 items-center">
        <div class="flex-shrink-0"><img src="logo.PNG" class="h-16 w-auto" alt="Logo"></div>
        <button @click="mobileMenuOpen = true" class="p-3 hover:bg-gray-100 rounded-md">
          <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
      </div>
    </div>
    <div class="border-t border-gray-100 bg-gray-50/50 py-4">
      <div class="max-w-7xl mx-auto px-4 flex space-x-3 overflow-x-auto no-scrollbar justify-start md:justify-center">
        <a href="index.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase hover:bg-gray-50 whitespace-nowrap">Home</a>
        <a href="auction.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase hover:bg-gray-50 whitespace-nowrap">Auction</a>
        <a href="membership.html" class="bg-[#f9a825] text-slate-950 font-black px-5 py-2.5 rounded-full text-sm uppercase whitespace-nowrap">Membership</a>
        <a href="contact.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase hover:bg-gray-50 whitespace-nowrap">Contact</a>
      </div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="relative bg-slate-950 py-24 px-4 text-center">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-5xl md:text-6xl font-black text-white uppercase tracking-tight">
        Unlock <span class="text-[#f9a825]">Premium Access</span>
      </h1>
      <p class="mt-6 text-gray-400 uppercase tracking-widest font-bold">Join our elite network for advanced logistics and bidding.</p>
      <div class="mt-10 flex flex-col sm:flex-row justify-center gap-4">
        <button @click="mode = 'signup'" class="bg-[#f9a825] text-slate-950 font-black px-8 py-4 rounded-full uppercase tracking-widest hover:bg-amber-500 transition-all">Sign Up Now</button>
        <button @click="mode = 'login'" class="bg-white text-slate-900 font-black px-8 py-4 rounded-full uppercase tracking-widest hover:bg-gray-200 transition-all">Login</button>
      </div>

      <!-- Dropdown Auth Area -->
      <div x-show="mode !== ''" x-cloak class="mt-10 max-w-sm mx-auto bg-white p-6 rounded-xl text-left border-t-4 border-[#f9a825]">
        <h3 class="font-black uppercase text-slate-900 mb-4" x-text="mode === 'login' ? 'Member Login' : 'Create Account'"></h3>
        <input type="text" placeholder="Email Address" class="w-full p-3 mb-3 border rounded">
        <input type="password" placeholder="Password" class="w-full p-3 mb-4 border rounded">
        <button class="w-full bg-slate-900 text-white font-black py-3 rounded uppercase text-sm" x-text="mode === 'login' ? 'Login' : 'Register'"></button>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-slate-950 py-12 text-center">
    <p class="text-white font-black uppercase text-sm">Car Buyer Kenya Logistics</p>
    <p class="text-gray-500 text-[10px] mt-2 uppercase font-bold">Trusted by dealers across East Africa since 2012.</p>
    <p class="text-gray-700 text-[9px] mt-6 uppercase">&copy; 2026 All Rights Reserved.</p>
  </footer>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
