<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Login | Car Buyer Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="text-slate-900" x-data="{ mobileMenuOpen: false }">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-24 items-center">
        <div class="flex-shrink-0 flex items-center h-full py-2">
          <img src="logo.PNG" alt="Car Buyer Kenya Logo" class="h-16 w-auto object-contain max-w-[260px]" />
        </div>
        <div class="flex items-center">
          <button @click="mobileMenuOpen = true" type="button" class="inline-flex items-center justify-center p-3 rounded-md text-slate-900 hover:bg-gray-100 focus:outline-none">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    
    <!-- NAVIGATION BAR -->
    <div class="border-t border-gray-100 bg-gray-50/50 py-4">
      <div class="max-w-7xl mx-auto px-4">
        <div class="flex space-x-3 overflow-x-auto no-scrollbar py-2 justify-start md:justify-center">
          <a href="index.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Home</a>
          <a href="about.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">About Us</a>
          <a href="auction.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Auction Purchase</a>
          <a href="showroom.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Nairobi Stock</a>
          <a href="finance.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Import Finance</a>
          <a href="dealers.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">B2B Dealers</a>
          <a href="clearing.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Port Clearing</a>
          <a href="training.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Training Academy</a>
          <a href="contact.html" class="bg-white border border-gray-200 text-slate-700 font-bold px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap transition-colors hover:bg-gray-50">Contact</a>
          <a href="membership.html" class="bg-[#f9a825] text-slate-950 font-black px-5 py-2.5 rounded-full text-sm uppercase tracking-wider whitespace-nowrap shadow-sm">Membership</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile Menu Overlay -->
  <div x-show="mobileMenuOpen" x-cloak class="fixed inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center space-y-6 text-white">
    <button @click="mobileMenuOpen = false" class="absolute top-6 right-6 text-white text-4xl font-black">&times;</button>
    <a href="index.html" class="font-black text-xl uppercase tracking-widest hover:text-[#f9a825]">Home</a>
    <a href="auction.html" class="font-black text-xl uppercase tracking-widest hover:text-[#f9a825]">Auction Purchase</a>
    <a href="membership.html" class="text-[#f9a825] font-black text-xl uppercase tracking-widest">Membership</a>
    <a href="contact.html" class="font-black text-xl uppercase tracking-widest hover:text-[#f9a825]">Contact</a>
  </div>

  <!-- LOGIN CONTAINER -->
  <main class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
      <h1 class="text-2xl font-black uppercase tracking-tight mb-6 text-center">Membership</h1>
      
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-black uppercase text-gray-700 mb-1">User ID for Delights:</label>
          <input type="text" id="userId" placeholder="ID" required class="w-full border border-gray-300 rounded px-4 py-3 focus:border-[#f9a825] outline-none">
        </div>
        
        <div>
          <label class="block text-xs font-black uppercase text-gray-700 mb-1">Password:</label>
          <input type="password" id="password" placeholder="PASS" required class="w-full border border-gray-300 rounded px-4 py-3 focus:border-[#f9a825] outline-none">
        </div>

        <button type="submit" class="w-full bg-[#f9a825] hover:bg-amber-500 text-slate-950 font-black uppercase tracking-widest py-3 rounded transition-colors shadow-lg mt-2 flex items-center justify-center">
          <span class="mr-2">👤</span> LOG IN
        </button>

        <div class="text-center mt-4">
          <a href="#" class="text-[#f9a825] hover:text-amber-600 text-xs font-bold uppercase tracking-widest">>> Forgot Password?</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="text-center text-[10px] text-gray-400 uppercase tracking-widest py-10">
    &copy; 2026 Car Buyer Kenya Logistics Group. All Rights Reserved.
  </footer>

</body>
</html>
