<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Login | Car Buyer Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
  </style>
</head>
<body class="text-slate-900">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <img src="logo.PNG" alt="Logo" class="h-12 w-auto object-contain">
      <a href="index.html" class="text-sm font-bold uppercase tracking-widest hover:text-[#f9a825]">← Back Home</a>
    </div>
  </header>

  <!-- LOGIN CONTAINER -->
  <main class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
      <h1 class="text-2xl font-black uppercase tracking-tight mb-6 text-center">Membership</h1>
      
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-black uppercase text-gray-700 mb-1">User ID for Delights:</label>
          <input type="text" placeholder="ID" class="w-full border border-gray-300 rounded px-4 py-3 focus:border-[#f9a825] outline-none">
        </div>
        
        <div>
          <label class="block text-xs font-black uppercase text-gray-700 mb-1">Password:</label>
          <input type="password" placeholder="PASS" class="w-full border border-gray-300 rounded px-4 py-3 focus:border-[#f9a825] outline-none">
        </div>

        <button class="w-full bg-[#f9a825] hover:bg-amber-500 text-slate-950 font-black uppercase tracking-widest py-3 rounded transition-colors shadow-lg mt-2 flex items-center justify-center">
          <span class="mr-2">👤</span> LOG IN
        </button>

        <div class="text-center mt-4">
          <a href="#" class="text-[#f9a825] hover:text-amber-600 text-xs font-bold uppercase tracking-widest">>> Forgot Password?</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center text-[10px] text-gray-400 uppercase tracking-widest py-10">
    &copy; 2026 Car Buyer Kenya Logistics Group.
  </footer>

</body>
</html>
