<body class="text-slate-900" x-data="{ 
  mobileMenuOpen: false,
  sheetId: '1-rGk0xSLEeIEkflto7AIUTfz5WUPwT9EWrZ2NctSuXA',
  car: null,
  rate: 129.5,

  formatUSD(kesString) {
    const num = parseFloat(kesString.toString().replace(/[^0-9.-]+/g, ''));
    if (isNaN(num)) return kesString;
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num / this.rate);
  },

  init() {
    fetch(`https://docs.google.com/spreadsheets/d/${this.sheetId}/export?format=tsv`)
      .then(res => res.text())
      .then(text => {
        let rows = text.replace(/\r/g, '').split('\n').map(r => r.split('\t'));
        let headers = rows[0].map(h => h.trim().toLowerCase());
        
        let sectionIdx = headers.indexOf('section');
        let weeklyCarRow = rows.slice(1).find(row => 
          sectionIdx !== -1 && row[sectionIdx] && row[sectionIdx].trim().toLowerCase() === 'car_of_the_week'
        );

        if (weeklyCarRow) {
          let obj = {};
          headers.forEach((h, i) => { obj[h] = weeklyCarRow[i] ? weeklyCarRow[i].trim() : ''; });
          this.car = {
            title: obj.title || '',
            imageUrl: obj.images_url || '',
            lotNo: obj.lot_no || '',
            stockId: obj.stock_id || '',
            model: obj.model || '',
            mileage: obj.mileage || '',
            engine: obj.engine || '',
            color: obj.color || '',
            drive: obj.drive || '',
            extras: obj.extras || '',
            price: obj.price ? this.formatUSD(obj.price) : 'Contact Us'
          };
        }
      })
  }
}">
