<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairobi Stock - Car Buyer Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="text-slate-900 overflow-x-hidden" x-data="{
  sheetId: '1-rGk0xSLEeIEkflto7AIUTfz5WUPwT9EWrZ2NctSuXA',
  cars: [],
  loading: true,
  menuOpen: false,
  init() {
    fetch('https://docs.google.com/spreadsheets/d/' + this.sheetId + '/export?format=tsv')
      .then(res => res.text())
      .then(text => {
        let rows = text.replace(/\r/g, '').split('\n').map(r => r.split('\t'));
        let headers = rows[0].map(h => h.trim().toLowerCase());
        this.cars = rows.slice(1).map((row, idx) => {
          let obj = {};
          headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ''; });
          if (!obj.title || obj.section !== 'showroom') return null;
          return { id: idx, title: obj.title.toUpperCase(), img: obj.images_url || 'placeholder-car.jpg', price: obj.price, specs: obj.extras, dep: obj.deposit, mon: obj.monthly_pay };
        }).filter(c => c !== null);
        this.loading = false;
      });
  }
}">

  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <img src="logo.PNG" class="h-12 w-auto">
      
      <!-- Hamburger Button -->
      <button @click="menuOpen = true" class="p-2 text-slate-900">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
      </button>
    </div>
  </header>

  <!-- Fullscreen Navigation Menu -->
  <div x-show="menuOpen" x-cloak class="fixed inset-0 z-50 bg-[#0f172a] text-white flex flex-col items-center justify-center p-6">
    <button @click="menuOpen = false" class="absolute top-6 right-6 text-white text-4xl">&times;</button>
    <div class="flex flex-col gap-6 text-center font-black uppercase text-xl">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT US</a>
      <a href="auction.html">AUCTION PURCHASE</a>
      <a href="showroom.html">NAIROBI STOCK</a>
      <a href="finance.html">IMPORT FINANCE</a>
      <a href="dealers.html">B2B DEALERS</a>
      <a href="clearing.html">PORT CLEARING</a>
      <a href="academy.html">TRAINING ACADEMY</a>
      <a href="contact.html">CONTACT</a>
    </div>
  </div>

  <!-- Hero -->
  <section class="bg-[#0f172a] text-white py-16 px-4 text-center">
    <h1 class="text-3xl md:text-5xl font-black uppercase">NAIROBI <span class="text-[#f9a825]">ON-HAND STOCK</span></h1>
  </section>

  <!-- Grid -->
  <main class="max-w-7xl mx-auto px-4 py-16">
    <div x-show="loading" class="text-center py-20 text-slate-400 text-xs uppercase tracking-widest">Loading cars...</div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <template x-for="car in cars" :key="car.id">
        <div x-data="{ exp: false }" class="bg-white border rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all">
          <div class="w-full h-56 bg-slate-200 overflow-hidden">
            <img :src="car.img" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='placeholder-car.jpg';">
          </div>
          <div @click="exp = !exp" class="p-6 cursor-pointer">
            <h3 class="font-black text-sm uppercase" x-text="car.title"></h3>
            <div class="text-[#f9a825] font-black text-sm mt-1" x-text="car.price"></div>
            <div x-show="exp" x-collapse class="mt-4 pt-4 border-t space-y-4">
              <p class="text-[10px] text-slate-500 bg-gray-50 p-3 rounded uppercase" x-text="car.specs"></p>
              <div class="grid grid-cols-2 gap-2 text-[9px] font-bold uppercase bg-slate-900 text-white p-3 rounded-lg">
                <div>Deposit: <span class="text-[#f9a825]" x-text="car.dep"></span></div>
                <div>Monthly: <span class="text-[#f9a825]" x-text="car.mon"></span></div>
              </div>
              <a href="https://wa.me/254737911915" target="_blank" class="block w-full text-center bg-[#f9a825] hover:bg-slate-900 text-slate-900 font-black py-3 rounded-lg text-[10px] uppercase">WhatsApp Us</a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-950 text-white py-16 px-4 text-center border-t border-slate-800">
    <h4 class="font-black uppercase mb-8">Need Help Finding a Car?</h4>
    <a href="https://wa.me/254737911915" target="_blank" class="inline-block bg-[#25D366] px-10 py-4 rounded-full font-black text-[11px] uppercase hover:bg-white hover:text-[#25D366] transition-all">
      Contact Us on WhatsApp
    </a>
  </footer>
</body>
</html>
