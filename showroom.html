<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairobi Stock - Car Buyer Kenya</title>
  
  <meta name="description" content="Browse our current physical on-hand vehicle inventory at our Nairobi showroom. Quality-certified imports from Japan and the UK with flexible Lipa Mdogo Mdogo financing options.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Nairobi On-Hand Stock - Car Buyer Kenya">
  <meta property="og:image" content="logo.PNG">
  <meta property="og:url" content="https://carbuyerkenya.com/showroom.html">

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="text-slate-900 overflow-x-hidden" x-data="{ 
  mobileMenuOpen: false,
  sheetId: '1-rGk0xSLEeIEkflto7AIUTfz5WUPwT9EWrZ2NctSuXA',
  cars: [],

  init() {
    fetch(`https://docs.google.com/spreadsheets/d/${this.sheetId}/export?format=tsv`)
      .then(res => res.text())
      .then(text => {
        let cleanText = text.replace(/\r/g, '');
        let rows = cleanText.split('\n').map(r => r.split('\t'));
        let headers = rows[0].map(h => h.trim().toLowerCase());
        
        this.cars = rows.slice(1).map((row, idx) => {
          let obj = {};
          headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ''; });
          if (!obj.title || obj.section !== 'showroom') return null;

          // URL Processing Logic: Automatically handles ImgBB links
          let rawUrl = obj.image_url;
          let displayUrl = 'placeholder-car.jpg';
          
          if (rawUrl) {
            // If it's an ImgBB link, use the proxy to display the image directly
            if (rawUrl.includes('ibb.co')) {
              displayUrl = `https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}`;
            }
            // Existing Drive support
            else if (rawUrl.includes('drive.google.com')) {
              let fileId = rawUrl.split('/d/')[1].split('/')[0];
              displayUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
            } 
            // Default: Assume it's a direct image URL
            else {
              displayUrl = rawUrl;
            }
          }
          
          return {
            id: 'sheet-' + idx,
            status: 'In Nairobi Showroom',
            statusClass: 'text-emerald-600 bg-emerald-50',
            displayName: obj.title.toUpperCase(),
            fileName: displayUrl,
            priceText: obj.price,
            specs: obj.extras,
            details: { model: obj.model || 'N/A', engine: obj.engine || 'N/A', mileage: obj.mileage || 'Verified' },
            financing: { 
              type: 'Lipa Mdogo Mdogo', 
              deposit: obj.deposit || 'N/A', 
              monthly: obj.monthly_pay || 'N/A' 
            }
          };
        }).filter(c => c !== null);
      });
  }
}">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/95">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-24 items-center">
        <div class="flex-shrink-0"><a href="index.html"><img src="logo.PNG" alt="Logo" class="h-16 w-auto" /></a></div>
        <button @click="mobileMenuOpen = true" class="p-3"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button>
      </div>
    </div>
  </header>

  <section class="bg-[#0f172a] text-white py-20 px-4 text-center">
    <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tight">NAIROBI <span class="text-[#f9a825]">ON-HAND STOCK</span></h1>
    <p class="text-xs md:text-base text-gray-300 uppercase tracking-widest font-black max-w-2xl mx-auto mt-4">
      THIS FRESH IMPORT SELECTED CLEAN CARS ARE NOW AVAILABLE IN OUR NAIROBI SHOWROOM.
    </p>
  </section>

  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <template x-for="car in cars" :key="car.id">
        <div x-data="{ expanded: false }" class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all">
          <div class="w-full h-56 bg-slate-900 overflow-hidden">
            <!-- The onerror handles if the proxy fails to load an image -->
            <img :src="car.fileName" 
                 class="w-full h-full object-cover" 
                 loading="lazy" 
                 onerror="this.src='placeholder-car.jpg'">
          </div>
          <div @click="expanded = !expanded" class="p-6 cursor-pointer">
            <h3 class="font-black text-base uppercase group-hover:text-[#f9a825]" x-text="car.displayName"></h3>
            <div class="text-[#f9a825] font-black text-sm" x-text="car.priceText"></div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <footer class="bg-slate-950 text-white mt-20 p-12 text-center">
    <div class="text-[11px] text-slate-500 uppercase font-black">&copy; 2026 Car Buyer Kenya. All Rights Reserved.</div>
  </footer>
</body>
</html>
