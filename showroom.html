<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairobi Stock - Car Buyer Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="text-slate-900 overflow-x-hidden" x-data="{ 
  sheetId: '1-rGk0xSLEeIEkflto7AIUTfz5WUPwT9EWrZ2NctSuXA',
  cars: [],
  init() {
    fetch(`https://docs.google.com/spreadsheets/d/${this.sheetId}/export?format=tsv`)
      .then(res => res.text())
      .then(text => {
        let rows = text.replace(/\r/g, '').split('\n').map(r => r.split('\t'));
        let headers = rows[0].map(h => h.trim().toLowerCase());
        this.cars = rows.slice(1).map((row, idx) => {
          let obj = {};
          headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ''; });
          if (!obj.title || obj.section !== 'showroom') return null;
          
          let rawUrl = obj.image_url.replace(/[\[\]]/g, '').trim();
          let displayUrl = (rawUrl.includes('ibb.co')) ? `https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}` : rawUrl;
          
          return { id: idx, displayName: obj.title.toUpperCase(), fileName: displayUrl, priceText: obj.price, specs: obj.extras, deposit: obj.deposit, monthly: obj.monthly_pay };
        }).filter(c => c !== null);
      });
  }
}">

  <!-- Header Navigation -->
  <header class="bg-white border-b sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <img src="logo.PNG" class="h-12 w-auto">
      <div class="hidden md:flex gap-4">
        <a href="index.html" class="text-xs font-bold border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-50">HOME</a>
        <a href="about.html" class="text-xs font-bold border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-50">ABOUT US</a>
        <a href="auction.html" class="text-xs font-bold border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-50">AUCTION PURCHASE</a>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="bg-[#0f172a] text-white py-16 px-4 text-center">
    <h1 class="text-3xl md:text-5xl font-black uppercase">NAIROBI <span class="text-[#f9a825]">ON-HAND STOCK</span></h1>
    <p class="text-[10px] md:text-sm text-gray-300 uppercase tracking-widest font-black max-w-lg mx-auto mt-4">
      This fresh import selected clean cars are now available in our Nairobi showroom. Come or inquire for more. We have variety.
    </p>
  </section>

  <!-- Banner -->
  <div class="bg-[#f9a825] py-3 text-center font-black text-[10px] md:text-xs uppercase tracking-widest animate-pulse">
    🔥 Lipa Mdogo Mdogo available and balance to be paid after 48 months 🔥
  </div>

  <!-- Inventory Grid -->
  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <template x-for="car in cars" :key="car.id">
        <div x-data="{ expanded: false }" class="bg-white border rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all">
          <div class="w-full h-56 bg-slate-200">
            <img :src="car.fileName" class="w-full h-full object-cover" onerror="this.src='placeholder-car.jpg'">
          </div>
          <div @click="expanded = !expanded" class="p-6 cursor-pointer">
            <h3 class="font-black text-sm uppercase" x-text="car.displayName"></h3>
            <div class="text-[#f9a825] font-black text-sm mt-1" x-text="car.priceText"></div>
            
            <div x-show="expanded" x-collapse class="mt-4 pt-4 border-t space-y-4">
              <p class="text-[10px] text-slate-500 bg-gray-50 p-3 rounded uppercase" x-text="car.specs"></p>
              <div class="grid grid-cols-2 gap-2 text-[9px] font-bold uppercase bg-slate-900 text-white p-3 rounded-lg">
                <div>Deposit: <span class="text-[#f9a825]" x-text="car.deposit"></span></div>
                <div>Monthly: <span class="text-[#f9a825]" x-text="car.monthly"></span></div>
              </div>
              <a href="contact.html" class="block w-full text-center bg-slate-900 hover:bg-[#f9a825] text-white font-black py-3 rounded-lg text-[10px] uppercase">Book Physical Viewing</a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>
</body>
</html>
